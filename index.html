<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pop'n music жҘҪжӣІжҠҪйҒёгҒҸгӮ“</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('background_filtered.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-white relative">
    <div class="max-w-3xl mx-auto bg-gray-900 bg-opacity-90 rounded-2xl shadow-xl p-6 md:p-10 backdrop-blur-sm">
        <h1 class="text-3xl font-black text-center mb-8 text-blue-300">pop'n music<br>жҘҪжӣІжҠҪйҒёгҒҸгӮ“</h1>

        <div class="space-y-8 border-b pb-8 mb-8">
            <!-- гғ¬гғҷгғ«гғ•гӮЈгғ«гӮҝгғјпјҲеӢ•зҡ„з”ҹжҲҗгҒ«еӨүжӣҙпјү -->
            <div>
                <label class="block text-sm font-bold text-gray-300 mb-3">еҜҫиұЎгғ¬гғҷгғ«</label>
                <div id="level-filters" class="flex flex-wrap gap-4">
                    <!-- JavaScriptгҒ§иҮӘеӢ•з”ҹжҲҗгҒ•гӮҢгҒҫгҒҷ -->
                </div>
            </div>

            <!-- еұһжҖ§гғ•гӮЈгғ«гӮҝгғјпјҲеӢ•зҡ„з”ҹжҲҗпјү -->
            <div>
                <label class="block text-sm font-bold text-gray-300 mb-3">иӯңйқўеұһжҖ§пјҲиӨҮж•°йҒёжҠһеҸҜпјү</label>
                <div id="attribute-filters" class="flex flex-wrap gap-2 text-sm"></div>
            </div>

            <!-- ж•°еҖӨгғ•гӮЈгғ«гӮҝгғј -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-300 mb-1">жңҖдҪҺBPM</label>
                    <input type="number" id="min-bpm" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="дёӢйҷҗ">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-300 mb-1">жңҖй«ҳBPM</label>
                    <input type="number" id="max-bpm" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="дёҠйҷҗ">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-300 mb-1">жңҖдҪҺNotes</label>
                    <input type="number" id="min-notes" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="дҫӢ: 1500">
                </div>
            </div>
        </div>

        <div class="text-center">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-300 mb-2">жҠҪйҒёгӮўгғӢгғЎгғјгӮ·гғ§гғі</label>
                <div class="flex justify-center space-x-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="animation-type" value="simple" checked>
                        <span>гӮ·гғігғ—гғ«</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="animation-type" value="rich">
                        <span>гғӘгғғгғҒ</span>
                    </label>
                </div>
            </div>
            <button id="draw-button" class="bg-blue-600 hover:bg-blue-700 active:scale-95 transition-transform text-white text-xl font-black py-4 px-12 rounded-full shadow-lg transition disabled:bg-slate-300">
                жҘҪжӣІгӮ’жҠҪйҒёгҒҷгӮӢпјҒ
            </button>
            <p id="match-count" class="text-sm text-gray-300 mt-4 italic font-medium">иӘӯгҒҝиҫјгҒҝдёӯ...</p>
            <div id="filter-preview" class="text-xs text-gray-400 mt-3 space-y-2"></div>
        </div>

        <!-- жҠҪйҒёдёӯгғӯгғјгғҮгӮЈгғігӮ°гӮЁгғӘгӮўпјҲгғӘгғғгғҒзүҲз”Ёпјү -->
        <div id="loading-area" class="mt-10 hidden">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-inner text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-white mx-auto mb-4"></div>
                <p class="text-xl font-bold">жҠҪйҒёдёӯ...</p>
                <p class="text-blue-100 mt-2">зҙ ж•өгҒӘжӣІгӮ’йҒёгӮ“гҒ§гҒ„гҒҫгҒҷ</p>
            </div>
        </div>

        <!-- зөҗжһңиЎЁзӨәгӮЁгғӘгӮў -->
        <div id="result-area" class="mt-10 hidden">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-inner">
                <div id="res-level" class="inline-block bg-gray-800 text-blue-300 font-black px-3 py-1 rounded-md mb-4 text-sm"></div>
                <p id="res-genre" class="text-blue-100 text-sm font-bold mb-1"></p>
                <h2 id="res-title" class="text-3xl font-black mb-6"></h2>
                <div class="grid grid-cols-2 gap-y-3 text-sm border-t border-blue-400 pt-6">
                    <p>BPM: <span id="res-bpm"></span></p>
                    <p>Notes: <span id="res-notes"></span></p>
                    <p>жј”еҘҸжҷӮй–“: <span id="res-time"></span></p>
                    <div class="col-span-2">
                        <p id="res-attributes" class="italic text-xs"></p>
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <a id="res-link" href="#" target="_blank" class="bg-gray-800 text-blue-300 font-bold py-2 px-6 rounded-lg">ж”»з•ҘгӮ’иҰӢгӮӢ</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allSongs = [];

        function createStars() {
            const numStars = 50;
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(star);
            }
        }

        async function loadSongs() {
            try {
                const response = await fetch('master_data.json');
                allSongs = await response.json();
                initApp();
                createStars();
            } catch (error) {
                document.getElementById('match-count').innerText = "гғҮгғјгӮҝгҒ®иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮ";
            }
        }

        function initApp() {
            // 1. гғ¬гғҷгғ«гғ•гӮЈгғ«гӮҝгғјгҒ®еӢ•зҡ„з”ҹжҲҗ
            const levelContainer = document.getElementById('level-filters');
            const uniqueLevels = [...new Set(allSongs.map(s => s.level))].sort((a, b) => b - a); // йҷҚй Ҷ

            uniqueLevels.forEach(lv => {
                const label = document.createElement('label');
                label.className = "flex items-center space-x-2 cursor-pointer bg-gray-800 px-4 py-2 rounded-lg border border-gray-600";
                label.innerHTML = `
                    <input type="checkbox" value="${lv}" class="level-checkbox w-5 h-5" checked>
                    <span class="font-bold">Lv.${lv}</span>
                `;
                label.addEventListener('change', updateMatchCount);
                levelContainer.appendChild(label);
            });

            // 2. еұһжҖ§гғ•гӮЈгғ«гӮҝгғјгҒ®еӢ•зҡ„з”ҹжҲҗ
            const attrContainer = document.getElementById('attribute-filters');
            const attrs = new Set();
            allSongs.forEach(s => s.attributes.forEach(a => attrs.add(a)));
            
            Array.from(attrs).sort().forEach(attr => {
                const label = document.createElement('label');
                label.className = "flex items-center space-x-1 bg-gray-700 px-2 py-1 rounded border border-gray-500 hover:border-blue-400 cursor-pointer transition";
                label.innerHTML = `<input type="checkbox" value="${attr}" class="attr-checkbox"> <span>${attr}</span>`;
                label.addEventListener('change', updateMatchCount);
                attrContainer.appendChild(label);
            });

            // гҒқгҒ®д»–гҒ®ж•°еҖӨгғ•гӮЈгғ«гӮҝгғјгҒ«гӮӨгғҷгғігғҲзҷ»йҢІ
            document.querySelectorAll('#min-bpm, #max-bpm, #min-notes').forEach(el => {
                el.addEventListener('input', updateMatchCount);
            });

            updateMatchCount();
        }

        function getFilteredSongs() {
            // гғҒгӮ§гғғгӮҜгҒ•гӮҢгҒҰгҒ„гӮӢгғ¬гғҷгғ«гӮ’гҒҷгҒ№гҒҰеҸ–еҫ—
            const selectedLv = Array.from(document.querySelectorAll('.level-checkbox:checked')).map(cb => parseInt(cb.value));
            const selectedAttrs = Array.from(document.querySelectorAll('.attr-checkbox:checked')).map(cb => cb.value);
            const minBpm = parseInt(document.getElementById('min-bpm').value) || 0;
            const maxBpm = parseInt(document.getElementById('max-bpm').value) || 999;
            const minNotes = parseInt(document.getElementById('min-notes').value) || 0;

            return allSongs.filter(song => {
                const matchLv = selectedLv.includes(song.level);
                const matchAttrs = selectedAttrs.every(attr => song.attributes.includes(attr));
                const matchBpm = song.bpm_min >= minBpm && song.bpm_max <= maxBpm;
                const matchNotes = song.notes >= minNotes;
                return matchLv && matchAttrs && matchBpm && matchNotes;
            });
        }

        function updateFilterPreview() {
            const selectedLv = Array.from(document.querySelectorAll('.level-checkbox:checked'))
                .map(cb => `Lv.${cb.value}`).join(', ');
            const selectedAttrs = Array.from(document.querySelectorAll('.attr-checkbox:checked'))
                .map(cb => cb.value).join(', ');
            const minBpm = parseInt(document.getElementById('min-bpm').value) || '-';
            const maxBpm = parseInt(document.getElementById('max-bpm').value) || '-';
            const minNotes = parseInt(document.getElementById('min-notes').value) || '-';

            let previewHTML = '';
            if (selectedLv) previewHTML += `<p>гғ¬гғҷгғ«: ${selectedLv}</p>`;
            if (selectedAttrs) previewHTML += `<p>еұһжҖ§: ${selectedAttrs}</p>`;
            previewHTML += `<p>BPM: ${minBpm} ~ ${maxBpm}</p>`;
            if (minNotes !== '-') previewHTML += `<p>жңҖдҪҺNotes: ${minNotes}</p>`;

            document.getElementById('filter-preview').innerHTML = previewHTML;
        }

        function updateMatchCount() {
            const count = getFilteredSongs().length;
            document.getElementById('match-count').innerText = `и©ІеҪ“жӣІж•°: ${count}жӣІ / е…Ё${allSongs.length}жӣІ`;
            document.getElementById('draw-button').disabled = count === 0;
            updateFilterPreview();
        }

        document.getElementById('draw-button').onclick = () => {
            const filtered = getFilteredSongs();
            if (filtered.length === 0) return;
            
            const button = document.getElementById('draw-button');
            const animationType = document.querySelector('input[name="animation-type"]:checked').value;
            
            if (animationType === 'simple') {
                button.disabled = true;
                button.innerText = "жҠҪйҒёдёӯ...";
            } else {
                document.getElementById('loading-area').classList.remove('hidden');
                button.style.display = 'none';
            }
            
            setTimeout(() => {
                const song = filtered[Math.floor(Math.random() * filtered.length)];
                
                document.getElementById('res-level').innerText = "Lv." + song.level;
                document.getElementById('res-genre').innerText = song.genre;
                document.getElementById('res-title').innerText = song.title;
                document.getElementById('res-bpm').innerText = song.bpm_display;
                document.getElementById('res-notes').innerText = song.notes;
                document.getElementById('res-time').innerText = song.time || "дёҚжҳҺ";
                document.getElementById('res-attributes').innerText = song.attributes.join(' / ');
                document.getElementById('res-link').href = song.url;
                document.getElementById('result-area').classList.remove('hidden');
                
                // гғӘгӮ»гғғгғҲ
                if (animationType === 'simple') {
                    button.disabled = false;
                    button.innerText = "жҘҪжӣІгӮ’жҠҪйҒёгҒҷгӮӢпјҒ";
                } else {
                    document.getElementById('loading-area').classList.add('hidden');
                    button.style.display = '';
                }
            }, 300);
        };

        loadSongs();
    </script>
</body>
</html>
