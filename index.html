<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pop'n music 楽曲抽選くん</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-10">
        <h1 class="text-3xl font-black text-center mb-8 text-blue-700">pop'n music 楽曲抽選くん</h1>

        <div class="space-y-8 border-b pb-8 mb-8">
            <!-- レベルフィルター（動的生成に変更） -->
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-3">対象レベル</label>
                <div id="level-filters" class="flex flex-wrap gap-4">
                    <!-- JavaScriptで自動生成されます -->
                </div>
            </div>

            <!-- 属性フィルター（動的生成） -->
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-3">重視する属性（複数選択可）</label>
                <div id="attribute-filters" class="flex flex-wrap gap-2 text-sm"></div>
            </div>

            <!-- 数値フィルター -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">最低BPM</label>
                    <input type="number" id="min-bpm" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="下限">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">最高BPM</label>
                    <input type="number" id="max-bpm" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="上限">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">最低Notes</label>
                    <input type="number" id="min-notes" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="例: 1500">
                </div>
            </div>
        </div>

        <div class="text-center">
            <div class="mb-4">
                <label class="block text-sm font-bold text-slate-600 mb-2">抽選アニメーション</label>
                <div class="flex justify-center space-x-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="animation-type" value="simple" checked>
                        <span>シンプル</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="animation-type" value="rich">
                        <span>リッチ</span>
                    </label>
                </div>
            </div>
            <button id="draw-button" class="bg-blue-600 hover:bg-blue-700 active:scale-95 transition-transform text-white text-xl font-black py-4 px-12 rounded-full shadow-lg transition disabled:bg-slate-300">
                楽曲を抽選する！
            </button>
            <p id="match-count" class="text-sm text-slate-500 mt-4 italic font-medium">読み込み中...</p>
            <div id="filter-preview" class="text-xs text-slate-600 mt-3 space-y-2"></div>
        </div>

        <!-- 抽選中ローディングエリア（リッチ版用） -->
        <div id="loading-area" class="mt-10 hidden">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-inner text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-white mx-auto mb-4"></div>
                <p class="text-xl font-bold">抽選中...</p>
                <p class="text-blue-100 mt-2">素敵な曲を選んでいます</p>
            </div>
        </div>

        <!-- 結果表示エリア -->
        <div id="result-area" class="mt-10 hidden">
            <!-- （中略：前回の結果表示エリアと同じ） -->
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-inner">
                <div id="res-level" class="inline-block bg-white text-blue-700 font-black px-3 py-1 rounded-md mb-4 text-sm"></div>
                <p id="res-genre" class="text-blue-100 text-sm font-bold mb-1"></p>
                <h2 id="res-title" class="text-3xl font-black mb-6"></h2>
                <div class="grid grid-cols-2 gap-y-3 text-sm border-t border-blue-400 pt-6">
                    <p>BPM: <span id="res-bpm"></span></p>
                    <p>Notes: <span id="res-notes"></span></p>
                    <p>演奏時間: <span id="res-time"></span></p>
                    <div class="col-span-2">
                        <p id="res-attributes" class="italic text-xs"></p>
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <a id="res-link" href="#" target="_blank" class="bg-white text-blue-700 font-bold py-2 px-6 rounded-lg">攻略を見る</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allSongs = [];

        async function loadSongs() {
            try {
                const response = await fetch('master_data.json');
                allSongs = await response.json();
                initApp();
            } catch (error) {
                document.getElementById('match-count').innerText = "データの読み込みに失敗しました。";
            }
        }

        function initApp() {
            // 1. レベルフィルターの動的生成
            const levelContainer = document.getElementById('level-filters');
            const uniqueLevels = [...new Set(allSongs.map(s => s.level))].sort((a, b) => b - a); // 降順

            uniqueLevels.forEach(lv => {
                const label = document.createElement('label');
                label.className = "flex items-center space-x-2 cursor-pointer bg-blue-50 px-4 py-2 rounded-lg border border-blue-200";
                label.innerHTML = `
                    <input type="checkbox" value="${lv}" class="level-checkbox w-5 h-5" checked>
                    <span class="font-bold">Lv.${lv}</span>
                `;
                label.addEventListener('change', updateMatchCount);
                levelContainer.appendChild(label);
            });

            // 2. 属性フィルターの動的生成
            const attrContainer = document.getElementById('attribute-filters');
            const attrs = new Set();
            allSongs.forEach(s => s.attributes.forEach(a => attrs.add(a)));
            
            Array.from(attrs).sort().forEach(attr => {
                const label = document.createElement('label');
                label.className = "flex items-center space-x-1 bg-white px-2 py-1 rounded border border-slate-200 hover:border-blue-400 cursor-pointer transition";
                label.innerHTML = `<input type="checkbox" value="${attr}" class="attr-checkbox"> <span>${attr}</span>`;
                label.addEventListener('change', updateMatchCount);
                attrContainer.appendChild(label);
            });

            // その他の数値フィルターにイベント登録
            document.querySelectorAll('#min-bpm, #max-bpm, #min-notes').forEach(el => {
                el.addEventListener('input', updateMatchCount);
            });

            updateMatchCount();
        }

        function getFilteredSongs() {
            // チェックされているレベルをすべて取得
            const selectedLv = Array.from(document.querySelectorAll('.level-checkbox:checked')).map(cb => parseInt(cb.value));
            const selectedAttrs = Array.from(document.querySelectorAll('.attr-checkbox:checked')).map(cb => cb.value);
            const minBpm = parseInt(document.getElementById('min-bpm').value) || 0;
            const maxBpm = parseInt(document.getElementById('max-bpm').value) || 999;
            const minNotes = parseInt(document.getElementById('min-notes').value) || 0;

            return allSongs.filter(song => {
                const matchLv = selectedLv.includes(song.level);
                const matchAttrs = selectedAttrs.every(attr => song.attributes.includes(attr));
                const matchBpm = song.bpm_min >= minBpm && song.bpm_max <= maxBpm;
                const matchNotes = song.notes >= minNotes;
                return matchLv && matchAttrs && matchBpm && matchNotes;
            });
        }

        function updateFilterPreview() {
            const selectedLv = Array.from(document.querySelectorAll('.level-checkbox:checked'))
                .map(cb => `Lv.${cb.value}`).join(', ');
            const selectedAttrs = Array.from(document.querySelectorAll('.attr-checkbox:checked'))
                .map(cb => cb.value).join(', ');
            const minBpm = parseInt(document.getElementById('min-bpm').value) || '-';
            const maxBpm = parseInt(document.getElementById('max-bpm').value) || '-';
            const minNotes = parseInt(document.getElementById('min-notes').value) || '-';

            let previewHTML = '';
            if (selectedLv) previewHTML += `<p>🎵 レベル: ${selectedLv}</p>`;
            if (selectedAttrs) previewHTML += `<p>✨ 属性: ${selectedAttrs}</p>`;
            previewHTML += `<p>⚡ BPM: ${minBpm} ~ ${maxBpm}</p>`;
            if (minNotes !== '-') previewHTML += `<p>🎹 最低Notes: ${minNotes}</p>`;

            document.getElementById('filter-preview').innerHTML = previewHTML;
        }

        function updateMatchCount() {
            const count = getFilteredSongs().length;
            document.getElementById('match-count').innerText = `該当曲数: ${count}曲 / 全${allSongs.length}曲`;
            document.getElementById('draw-button').disabled = count === 0;
            updateFilterPreview();
        }

        document.getElementById('draw-button').onclick = () => {
            const filtered = getFilteredSongs();
            if (filtered.length === 0) return;
            
            const button = document.getElementById('draw-button');
            const animationType = document.querySelector('input[name="animation-type"]:checked').value;
            
            if (animationType === 'simple') {
                button.disabled = true;
                button.innerText = "抽選中...";
            } else {
                document.getElementById('loading-area').classList.remove('hidden');
                button.style.display = 'none';
            }
            
            setTimeout(() => {
                const song = filtered[Math.floor(Math.random() * filtered.length)];
                
                document.getElementById('res-level').innerText = "Lv." + song.level;
                document.getElementById('res-genre').innerText = song.genre;
                document.getElementById('res-title').innerText = song.title;
                document.getElementById('res-bpm').innerText = song.bpm_display;
                document.getElementById('res-notes').innerText = song.notes;
                document.getElementById('res-time').innerText = song.time || "不明";
                document.getElementById('res-attributes').innerText = song.attributes.join(' / ');
                document.getElementById('res-link').href = song.url;
                document.getElementById('result-area').classList.remove('hidden');
                
                // リセット
                if (animationType === 'simple') {
                    button.disabled = false;
                    button.innerText = "楽曲を抽選する！";
                } else {
                    document.getElementById('loading-area').classList.add('hidden');
                    button.style.display = '';
                }
            }, 300);
        };

        loadSongs();
    </script>
</body>
</html>
