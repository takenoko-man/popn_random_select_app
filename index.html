<script>
    let allSongs = [];

    // 1. 外部JSONファイルの読み込み
    async function loadSongs() {
        try {
            // 同一ディレクトリにある popn_data.json を取得
            const response = await fetch('popn_data.json');
            if (!response.ok) throw new Error('データの読み込みに失敗しました');
            
            allSongs = await response.json();
            
            // データ読み込み完了後にUIを初期化
            initApp();
        } catch (error) {
            console.error(error);
            document.getElementById('match-count').innerText = "データの読み込みエラーが発生しました。";
        }
    }

    // 2. 属性リストをデータから自動抽出
    function getUniqueAttributes() {
        const attrs = new Set();
        // ソースにある「体力」「発狂」「辛ゲージ」などの属性をすべて収集 [1, 2]
        allSongs.forEach(s => s.attributes.forEach(a => attrs.add(a)));
        return Array.from(attrs).sort();
    }

    function initApp() {
        const container = document.getElementById('attribute-filters');
        const uniqueAttrs = getUniqueAttributes();

        uniqueAttrs.forEach(attr => {
            const label = document.createElement('label');
            label.className = "flex items-center space-x-1 bg-gray-50 px-2 py-1 rounded border hover:bg-gray-100 cursor-pointer";
            label.innerHTML = `<input type="checkbox" value="${attr}" class="attr-checkbox"> <span>${attr}</span>`;
            label.addEventListener('change', updateMatchCount);
            container.appendChild(label);
        });

        // フィルター入力のイベント設定
        document.getElementById('min-bpm').addEventListener('input', updateMatchCount);
        document.getElementById('max-bpm').addEventListener('input', updateMatchCount);
        document.getElementById('min-notes').addEventListener('input', updateMatchCount);
        
        updateMatchCount();
    }

    // 3. フィルタリングロジック（BPM範囲対応版）
    function getFilteredSongs() {
        const selectedAttrs = Array.from(document.querySelectorAll('.attr-checkbox:checked')).map(cb => cb.value);
        const minBpm = parseInt(document.getElementById('min-bpm').value) || 0;
        const maxBpm = parseInt(document.getElementById('max-bpm').value) || 999;
        const minNotes = parseInt(document.getElementById('min-notes').value) || 0;

        return allSongs.filter(song => {
            // 属性の完全一致チェック
            const hasAttrs = selectedAttrs.every(attr => song.attributes.includes(attr));
            
            // BPM条件：オイパンク0 [1] や クラシック9 [3] のようなソフラン曲も考慮
            const matchMinBpm = song.bpm_min >= minBpm;
            const matchMaxBpm = song.bpm_max <= maxBpm;
            
            const matchNotes = song.notes >= minNotes;

            return hasAttrs && matchMinBpm && matchMaxBpm && matchNotes;
        });
    }

    function updateMatchCount() {
        const count = getFilteredSongs().length;
        document.getElementById('match-count').innerText = `該当曲数: ${count}曲 / 全${allSongs.length}曲`;
        document.getElementById('draw-button').disabled = count === 0;
    }

    // 4. 抽選ボタンの動作
    document.getElementById('draw-button').onclick = () => {
        const filtered = getFilteredSongs();
        const song = filtered[Math.floor(Math.random() * filtered.length)];
        
        document.getElementById('res-genre').innerText = song.genre;
        document.getElementById('res-title').innerText = song.title;
        document.getElementById('res-bpm').innerText = song.bpm_display;
        document.getElementById('res-notes').innerText = song.notes;
        document.getElementById('res-time').innerText = song.time || "不明";
        document.getElementById('res-attributes').innerText = "属性: " + song.attributes.join(', ');
        document.getElementById('res-link').href = song.url;
        document.getElementById('result-area').classList.remove('hidden');
    };

    // アプリ起動
    loadSongs();
</script>
